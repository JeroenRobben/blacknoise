networks:
  wireguard-test:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: wg-test-br
    ipam:
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1

services:
  gotatun:
    build:
      # Build context is targets/ so the Dockerfile can reach shared/
      context: ..
      dockerfile: gotatun/Dockerfile
    container_name: gotatun-hardcoded-target
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wg0.conf:/etc/wireguard/wg0.conf:ro
    networks:
      wireguard-test:
        ipv4_address: 192.168.100.10
